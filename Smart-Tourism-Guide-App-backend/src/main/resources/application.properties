# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Supabase SSl
#spring.datasource.hikari.data-source-properties.ssl=true
#spring.datasource.hikari.data-source-properties.sslmode=require

# JWT Configuration
smart.app.jwtSecret=${JWT_SECRET}
smart.app.jwtExpirationMs=86400000

##REDIS configuration
#spring.cache.type=redis
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
#spring.data.redis.ssl.enabled=false

## Redis Cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Weather API Configuration (OpenWeatherMap)
weather.api.key=${WEATHER_API_KEY}
weather.api.base-url=${WEATHER_BASE_URL}
weather.api.timeout=5000
weather.cache.ttl=1800

app.frontend.url=${FRONTEND_URL}
#app.frontend.url=http://localhost:5173
# Brevo SMTP 
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${BREVO_EMAIL}
spring.mail.test-connection=false

